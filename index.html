<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>音感クルーズ</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121212;
            color: #e0e0e0;
            padding: 1.5rem;
            text-align: center;
            line-height: 1.65;
        }

        .box {
            max-width: 28rem;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 0.75rem;
            color: #fff;
        }

        p {
            margin: 0.5rem 0 0;
            font-size: 0.95rem;
            color: #aaa;
        }

        code {
            display: inline-block;
            margin-top: 0.6rem;
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: #e9f8f1;
            font-size: 0.86rem;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>このURLでは通常版を開けません</h1>
        <p>通常版は、下のフルURLを入力してアクセスしてください。</p>
        <code>https://soundcruise.github.io/Pitch-trainer/standard/</code>
    </div>
</body>

</html>
