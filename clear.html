<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最新版へ更新中</title>
    <style>
        body {
            font-family: 'Outfit', sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            color: #00ff88;
        }
    </style>
</head>

<body>
    <h1>最新版アプリに更新中...</h1>
    <p>古いキャッシュデータを削除しています。<br>しばらくお待ちください。</p>
    <script>
        async function clearCacheAndRedirect() {
            try {
                // 1. Unregister all service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        console.log('ServiceWorker unregistered');
                    }
                }

                // 2. Delete all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (let name of cacheNames) {
                        await caches.delete(name);
                        console.log('Cache deleted:', name);
                    }
                }
            } catch (e) {
                console.error('Error clearing cache:', e);
            } finally {
                // 3. Force reload without cache from server to the main page
                setTimeout(() => {
                    // Prevent returning to this clear.html via browser back button
                    window.location.replace('./pitch-trainer/standard/?updated=' + new Date().getTime());
                }, 1500);
            }
        }

        window.addEventListener('load', clearCacheAndRedirect);
    </script>
</body>

</html>
